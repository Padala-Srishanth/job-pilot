<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: 'Segoe UI', sans-serif; background: #111827; color: #e2e8f0; }
    .header { background: linear-gradient(135deg, #10b981, #059669); padding: 16px 20px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; color: #fff; }
    .header .badge { font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; color: #fff; }
    .content { padding: 16px; }
    .status { padding: 12px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; }
    .status.connected { background: #10b98120; border: 1px solid #10b98140; color: #10b981; }
    .status.disconnected { background: #ef444420; border: 1px solid #ef444440; color: #ef4444; }
    .job-card { background: #1e293b; border-radius: 8px; padding: 14px; margin-bottom: 10px; border: 1px solid #334155; }
    .job-card h3 { font-size: 14px; margin-bottom: 4px; color: #fff; }
    .job-card p { font-size: 12px; color: #94a3b8; }
    .job-card .meta { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .job-card .meta span { font-size: 11px; background: #111827; padding: 2px 8px; border-radius: 4px; color: #94a3b8; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .btn-save { background: #3b82f6; color: #fff; }
    .btn-save:hover { background: #2563eb; }
    .btn-track { background: #10b981; color: #fff; }
    .btn-track:hover { background: #059669; }
    .btn-saved { background: #1e293b; color: #64748b; cursor: default; }
    .settings { padding: 12px; border-top: 1px solid #1e293b; }
    .settings input { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; margin-top: 8px; }
    .settings label { font-size: 12px; color: #94a3b8; }
    .empty { text-align: center; padding: 20px; color: #64748b; font-size: 13px; }
    .footer { padding: 12px 16px; text-align: center; border-top: 1px solid #1e293b; }
    .footer a { color: #10b981; text-decoration: none; font-size: 12px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>JobPilot</h1>
    <span class="badge">Extension</span>
  </div>

  <div class="content">
    <div id="status" class="status disconnected">Not connected — enter your JobPilot API URL below</div>

    <div id="jobInfo" style="display:none">
      <div class="job-card">
        <h3 id="jobTitle">—</h3>
        <p id="jobCompany">—</p>
        <div class="meta">
          <span id="jobLocation">—</span>
          <span id="jobSource">—</span>
        </div>
        <button id="btnSave" class="btn btn-save" onclick="saveJob()">Save to JobPilot</button>
        <button id="btnTrack" class="btn btn-track" onclick="trackApplication()">Track Application</button>
      </div>
    </div>

    <div id="noJob" class="empty">
      Navigate to a job listing on LinkedIn, Indeed, Naukri, etc. to detect job details.
    </div>
  </div>

  <div class="settings">
    <label>JobPilot Server URL</label>
    <input id="apiUrl" type="text" placeholder="http://localhost:5000" />
  </div>

  <div class="footer">
    <a href="http://localhost:3000" target="_blank">Open JobPilot Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
